# Skill Evaluation CI — AMS
#
# Triggers:
#   - On push/PR when any CLAUDE.md or eval file changes
#   - Weekly scheduled run (Sundays 03:00 UTC)
#   - Manual dispatch for full suite or specific skill
#
# Jobs:
#   1. trigger-evals: Fast TF-IDF matching (no API key, runs in seconds)
#   2. functional-evals: Claude API calls (requires ANTHROPIC_API_KEY secret)
#   3. regression-check: Compare against stored baselines
#
# Required secrets:
#   - ANTHROPIC_API_KEY: For functional evals and deep trigger mode

name: Skill Evals

on:
  push:
    paths:
      - "skills/**/CLAUDE.md"
      - "skills/**/evals/**"
      - "scripts/eval_runner/**"
      - "scripts/audit_skills.py"
      - "scripts/audit_eval_coverage.py"
    branches: [master]

  pull_request:
    paths:
      - "skills/**/CLAUDE.md"
      - "skills/**/evals/**"
      - "scripts/eval_runner/**"

  schedule:
    # Weekly Sunday at 03:00 UTC
    - cron: "0 3 * * 0"

  workflow_dispatch:
    inputs:
      skill:
        description: "Specific skill to evaluate (leave empty for all)"
        required: false
        default: ""
      mode:
        description: "Trigger eval mode"
        required: false
        default: "fast"
        type: choice
        options:
          - fast
          - deep
      run_functional:
        description: "Run functional evals (uses API credits)"
        required: false
        default: false
        type: boolean
      save_baseline:
        description: "Save results as new baseline snapshot"
        required: false
        default: false
        type: boolean

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Audit — quick quality check, no API key needed
  # -----------------------------------------------------------------------
  audit:
    name: Skill Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run skill quality audit
        run: python scripts/audit_skills.py --project-root . --format json > audit-results.json

      - name: Run eval coverage audit
        run: python scripts/audit_eval_coverage.py --project-root . --format json > coverage-results.json

      - name: Check for Grade F skills
        run: |
          python -c "
          import json, sys
          with open('coverage-results.json') as f:
              results = json.load(f)
          grade_f = [r for r in results if r.get('coverage_grade') == 'F']
          if grade_f:
              print(f'WARNING: {len(grade_f)} skills with Grade F coverage:')
              for r in grade_f:
                  print(f'  - {r[\"name\"]}')
          else:
              print('All skills have eval coverage >= Grade C')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            audit-results.json
            coverage-results.json

  # -----------------------------------------------------------------------
  # Job 2: Trigger Evals — TF-IDF fast mode, no API key needed
  # -----------------------------------------------------------------------
  trigger-evals:
    name: Trigger Evals (Fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Determine skill scope
        id: scope
        run: |
          if [ -n "${{ github.event.inputs.skill }}" ]; then
            echo "skill_flag=--skill ${{ github.event.inputs.skill }}" >> $GITHUB_OUTPUT
          else
            echo "skill_flag=--all" >> $GITHUB_OUTPUT
          fi

      - name: Run trigger evals (fast mode)
        run: |
          python -m scripts.eval_runner.cli --project-root . \
            trigger ${{ steps.scope.outputs.skill_flag }} \
            --mode ${{ github.event.inputs.mode || 'fast' }} \
            --format markdown \
            --output trigger-report.md

      - name: Run trigger evals (JSON for parsing)
        run: |
          python -m scripts.eval_runner.cli --project-root . \
            trigger ${{ steps.scope.outputs.skill_flag }} \
            --mode ${{ github.event.inputs.mode || 'fast' }} \
            --format json \
            --output trigger-results.json

      - name: Check trigger accuracy threshold
        run: |
          python -c "
          import json, sys
          with open('trigger-results.json') as f:
              results = json.load(f)
          failures = []
          for r in results:
              acc = r.get('overall_accuracy', 0)
              if acc < 70.0:
                  failures.append(f\"{r['skill_name']}: {acc:.1f}%\")
          if failures:
              print(f'FAIL: {len(failures)} skills below 70% trigger accuracy:')
              for f_item in failures:
                  print(f'  - {f_item}')
              sys.exit(1)
          else:
              print(f'PASS: All {len(results)} skills >= 70% trigger accuracy')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trigger-results
          path: |
            trigger-report.md
            trigger-results.json

  # -----------------------------------------------------------------------
  # Job 3: Functional Evals — requires ANTHROPIC_API_KEY
  # -----------------------------------------------------------------------
  functional-evals:
    name: Functional Evals
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_functional == 'true'
    needs: [trigger-evals]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check API key
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret not configured"
            echo "Functional evals require an API key. Add it to repository secrets."
            exit 1
          fi

      - name: Run functional evals
        run: |
          SKILL_FLAG=""
          if [ -n "${{ github.event.inputs.skill }}" ]; then
            SKILL_FLAG="--skill ${{ github.event.inputs.skill }}"
          else
            SKILL_FLAG="--all"
          fi
          python -m scripts.eval_runner.cli --project-root . \
            functional $SKILL_FLAG \
            --model claude-sonnet-4-5-20250514 \
            --format text 2>&1 | tee functional-results.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-results
          path: functional-results.txt

  # -----------------------------------------------------------------------
  # Job 4: Regression Check — compares against stored baselines
  # -----------------------------------------------------------------------
  regression-check:
    name: Regression Check
    runs-on: ubuntu-latest
    needs: [trigger-evals]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run regression check
        run: |
          SKILL_FLAG=""
          if [ -n "${{ github.event.inputs.skill }}" ]; then
            SKILL_FLAG="--skill ${{ github.event.inputs.skill }}"
          else
            SKILL_FLAG="--all"
          fi
          python -m scripts.eval_runner.cli --project-root . \
            regression $SKILL_FLAG \
            --model claude-sonnet-4-5-20250514 \
            --output regression-report.md 2>&1 | tee regression-output.txt

      - name: Check for regressions
        run: |
          if grep -q "REGRESSION" regression-report.md 2>/dev/null; then
            echo "WARNING: Regressions detected — see regression-report.md"
            cat regression-report.md
          else
            echo "No regressions detected"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: |
            regression-report.md
            regression-output.txt

  # -----------------------------------------------------------------------
  # Job 5: Save Baseline (manual only)
  # -----------------------------------------------------------------------
  save-baseline:
    name: Save Baseline Snapshot
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.save_baseline == 'true'
    needs: [trigger-evals]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Save baseline snapshots
        run: |
          SKILL_FLAG=""
          if [ -n "${{ github.event.inputs.skill }}" ]; then
            SKILL_FLAG="--skill ${{ github.event.inputs.skill }}"
          else
            SKILL_FLAG="--all"
          fi
          python -m scripts.eval_runner.cli --project-root . \
            snapshot $SKILL_FLAG \
            --model claude-sonnet-4-5-20250514

      - name: List saved snapshots
        run: |
          python -m scripts.eval_runner.cli --project-root . \
            snapshot --list

      - name: Commit baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/baselines/
          git diff --cached --quiet || git commit -m "chore: update eval baseline snapshots"
          git push
